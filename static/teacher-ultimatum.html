<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老師後台 — 最後通牒</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0d0e14;--bg2:#13141c;--bg3:#1a1c27;--surface:#1e2030;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.16);--text:#e8e9f0;--text2:#9a9db8;--text3:#5c5f7a;--accent:#ff7eb6;--accent2:#ff9ec7;--green:#4ecb8a;--amber:#f0b429;--blue:#4a9eff;--red:#f06060;--r:12px;--rs:8px;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-weight:300;min-height:100vh;}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Noto Serif TC',serif;font-size:1.05rem;font-weight:700;color:var(--accent2);}
.container{max-width:1080px;margin:0 auto;padding:2rem 1.5rem;}
.screen{display:none;}.screen.active{display:block;}
.hero{text-align:center;padding:1rem 0 1.5rem;}
.hero h1{font-family:'Noto Serif TC',serif;font-size:1.7rem;font-weight:700;background:linear-gradient(135deg,#ff7eb6,#a594ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.4rem;}
.hero p{color:var(--text2);font-size:.9rem;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem;margin-bottom:1.2rem;}
.card-title{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:600;margin-bottom:.65rem;}
.fg{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.9rem;}
label{font-size:.78rem;color:var(--text2);font-weight:500;}
input[type=text],input[type=number]{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:.65rem .9rem;color:var(--text);font-size:.92rem;outline:none;}
input:focus{border-color:var(--accent);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
.btn{padding:.7rem 1.4rem;border-radius:var(--rs);font-size:.92rem;font-weight:500;cursor:pointer;border:none;transition:all .2s;width:100%;font-family:'Noto Sans TC',sans-serif;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}.btn-ghost:hover{border-color:var(--border2);color:var(--text);}
.btn-green{background:var(--green);color:#0d0e14;}.btn-red{background:var(--red);color:#fff;}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
.room-code{font-size:3rem;font-weight:700;letter-spacing:.4em;color:var(--accent2);text-align:center;padding:1.2rem;background:var(--bg3);border-radius:var(--rs);border:1px dashed var(--border2);font-variant-numeric:tabular-nums;}
.url-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:.7rem .9rem;font-family:monospace;font-size:.85rem;word-break:break-all;color:var(--accent2);}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.8rem;}
.stat{background:var(--bg3);border-radius:var(--rs);padding:.9rem;text-align:center;}
.stat .lbl{font-size:.72rem;color:var(--text3);margin-bottom:.3rem;}
.stat .val{font-size:1.6rem;font-weight:700;color:var(--accent2);}
.stat .val.green{color:var(--green);}.stat .val.amber{color:var(--amber);}.stat .val.blue{color:var(--blue);}
table{width:100%;border-collapse:collapse;font-size:.85rem;}th,td{padding:.55rem .5rem;text-align:left;border-bottom:1px solid var(--border);}
th{color:var(--text2);font-weight:500;font-size:.76rem;background:var(--bg3);}
.flex-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem;}
.text-xs{font-size:.73rem;color:var(--text3);}
.alert{padding:.7rem .9rem;border-radius:var(--rs);font-size:.82rem;border:1px solid;margin-bottom:1rem;}
.alert.info{background:rgba(74,158,255,.08);border-color:rgba(74,158,255,.25);color:var(--blue);}
.alert.warn{background:rgba(240,180,41,.08);border-color:rgba(240,180,41,.25);color:var(--amber);}
.phase-tag{display:inline-block;padding:.25rem .7rem;border-radius:20px;font-size:.75rem;font-weight:500;}
.phase-tag.lobby{background:rgba(240,180,41,.12);color:var(--amber);border:1px solid rgba(240,180,41,.3);}
.phase-tag.playing{background:rgba(78,203,138,.12);color:var(--green);border:1px solid rgba(78,203,138,.3);}
.phase-tag.ended{background:rgba(124,106,247,.12);color:var(--accent2);border:1px solid rgba(124,106,247,.3);}
.bar-row{display:flex;align-items:center;gap:.5rem;margin:.2rem 0;font-size:.8rem;}
.bar-row .lbl{width:60px;color:var(--text2);text-align:right;}
.bar-row .bar{flex:1;height:18px;background:var(--bg3);border-radius:4px;overflow:hidden;position:relative;}
.bar-row .bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));}
.bar-row .v{width:30px;color:var(--text);font-weight:600;}
</style>
</head>
<body>
<header>
  <div class="logo">💰 最後通牒 — 老師後台</div>
  <div id="header-info" class="text-xs"></div>
</header>

<div class="container">
<!-- ══ SETUP ══ -->
<div class="screen active" id="screen-setup">
  <div class="hero"><h1>建立最後通牒實驗</h1><p>提案者分配 $X，回應者選擇接受或拒絕（拒絕雙方都得 0）</p></div>

  <div style="display:flex;gap:.5rem;margin-bottom:1rem;">
    <button class="btn btn-ghost" style="flex:1;" onclick="location.href='/hub'">← 回實驗中心</button>
  </div>

  <div class="card">
    <p class="card-title">📝 房間設定</p>
    <div class="fg"><label>實驗標題</label><input type="text" id="i-title" value="最後通牒實驗"></div>
    <div class="row2">
      <div class="fg"><label>分配總額 ($)</label><input type="number" id="i-pie" value="100" min="1"></div>
      <div class="fg"><label>提案步距</label><input type="number" id="i-step" value="5" min="1"></div>
    </div>
    <div class="fg"><label><input type="checkbox" id="i-anon" checked> 匿名模式（顯示動物化名）</label></div>
  </div>

  <button class="btn btn-primary" onclick="createRoom()">建立房間 →</button>
</div>

<!-- ══ DASHBOARD ══ -->
<div class="screen" id="screen-dash">
  <div class="hero"><h1 id="d-title">最後通牒實驗</h1><p>房間 <span class="phase-tag" id="d-phase">lobby</span></p></div>

  <div class="card">
    <div class="flex-between">
      <div>
        <div class="text-xs">房號</div>
        <div class="room-code" id="d-code">----</div>
      </div>
      <div style="text-align:center;">
        <div style="background:#fff;padding:.6rem;border-radius:8px;display:inline-block;line-height:0;">
          <img id="qr-img" alt="QR" width="160" height="160" style="display:block;">
        </div>
        <div class="text-xs" style="margin-top:.4rem;" id="qr-url">—</div>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-green" id="btn-start" onclick="startGame()">▶ 開始（隨機配對）</button>
    <button class="btn btn-red" id="btn-end" onclick="endGame()" disabled>⏹ 結束實驗</button>
  </div>

  <div class="card" style="margin-top:1rem;">
    <p class="card-title">📊 即時統計</p>
    <div class="stats-grid">
      <div class="stat"><div class="lbl">學生</div><div class="val" id="s-n">0</div></div>
      <div class="stat"><div class="lbl">配對數</div><div class="val blue" id="s-pairs">0</div></div>
      <div class="stat"><div class="lbl">已提案</div><div class="val amber" id="s-offered">0</div></div>
      <div class="stat"><div class="lbl">已決定</div><div class="val green" id="s-decided">0</div></div>
      <div class="stat"><div class="lbl">平均提案</div><div class="val" id="s-avg">—</div></div>
      <div class="stat"><div class="lbl">接受率</div><div class="val green" id="s-acc">—</div></div>
    </div>
  </div>

  <div class="card">
    <p class="card-title">📈 提案分配直方圖</p>
    <div id="hist-area"><p class="text-xs">尚無提案</p></div>
  </div>

  <div class="card">
    <p class="card-title">👥 配對明細</p>
    <table id="pairs-table"><thead><tr><th>提案者</th><th>回應者</th><th>提案 $</th><th>結果</th><th>提案者得</th><th>回應者得</th></tr></thead>
    <tbody id="pairs-tbody"><tr><td colspan="6" class="text-xs">尚無資料</td></tr></tbody></table>
  </div>
</div>

</div>

<script>
let CODE='', TOKEN='', TIMER=null;

async function createRoom(){
  const body={title:document.getElementById('i-title').value.trim()||'最後通牒實驗',
              pie:parseInt(document.getElementById('i-pie').value)||100,
              step:parseInt(document.getElementById('i-step').value)||5,
              anonymous_mode:document.getElementById('i-anon').checked};
  try{
    const r=await fetch('/api/teacher/ult-rooms',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok) throw new Error('建立失敗');
    const d=await r.json();
    CODE=d.code; TOKEN=d.teacher_token;
    document.getElementById('d-code').textContent=CODE;
    document.getElementById('d-title').textContent=body.title;
    const url=`${location.origin}/ultimatum?room=${CODE}`;
    document.getElementById('qr-url').textContent=url;
    document.getElementById('qr-img').src=`https://api.qrserver.com/v1/create-qr-code/?size=160x160&margin=8&data=${encodeURIComponent(url)}`;
    document.getElementById('screen-setup').classList.remove('active');
    document.getElementById('screen-dash').classList.add('active');
    document.getElementById('header-info').textContent='房間 '+CODE;
    if(TIMER) clearInterval(TIMER);
    TIMER=setInterval(refresh,1500);
    refresh();
  }catch(e){alert('建立房間失敗：'+e.message);}
}

async function startGame(){
  if(!confirm('開始實驗後將隨機配對，學生立刻開始 — 確定嗎？')) return;
  const r=await fetch(`/api/teacher/exp-rooms/${CODE}/start?token=${encodeURIComponent(TOKEN)}`,{method:'POST'});
  if(!r.ok){alert('啟動失敗');return;}
  document.getElementById('btn-start').disabled=true;
  document.getElementById('btn-end').disabled=false;
}

async function endGame(){
  if(!confirm('結束實驗並公開統計？')) return;
  await fetch(`/api/teacher/exp-rooms/${CODE}/end?token=${encodeURIComponent(TOKEN)}`,{method:'POST'});
}

async function refresh(){
  try{
    const r=await fetch(`/api/teacher/exp-rooms/${CODE}?token=${encodeURIComponent(TOKEN)}`);
    if(!r.ok) return;
    const d=await r.json();
    const phaseEl=document.getElementById('d-phase');
    phaseEl.textContent=d.phase; phaseEl.className='phase-tag '+d.phase;
    if(d.phase==='lobby'){document.getElementById('btn-start').disabled=false;document.getElementById('btn-end').disabled=true;}
    if(d.phase==='playing'){document.getElementById('btn-start').disabled=true;document.getElementById('btn-end').disabled=false;}
    if(d.phase==='ended'){document.getElementById('btn-start').disabled=true;document.getElementById('btn-end').disabled=true;}

    document.getElementById('s-n').textContent=d.player_count;
    const st=d.stats||{};
    document.getElementById('s-pairs').textContent=d.pairs.length;
    const offered=d.pairs.filter(p=>p.offer!=null).length;
    const decided=d.pairs.filter(p=>p.resolved).length;
    document.getElementById('s-offered').textContent=offered;
    document.getElementById('s-decided').textContent=decided;
    document.getElementById('s-avg').textContent=st.avg_offer!=null?'$'+st.avg_offer:'—';
    document.getElementById('s-acc').textContent=st.accept_rate!=null?(st.accept_rate*100).toFixed(0)+'%':'—';

    // 直方圖
    const hist=st.histogram||[];
    if(hist.length){
      const total=hist.reduce((a,b)=>a+b[1],0);
      const max=Math.max(...hist.map(h=>h[1]));
      document.getElementById('hist-area').innerHTML=hist.map(([k,v])=>{
        const pct=(v/max*100).toFixed(0);
        return `<div class="bar-row"><div class="lbl">$${k}</div><div class="bar"><div class="fill" style="width:${pct}%;"></div></div><div class="v">${v}</div></div>`;
      }).join('');
    }else document.getElementById('hist-area').innerHTML='<p class="text-xs">尚無提案</p>';

    // 配對表
    const tbody=document.getElementById('pairs-tbody');
    if(d.pairs.length){
      tbody.innerHTML=d.pairs.map(p=>{
        const result=p.resolved?(p.accepted?'<span style="color:var(--green)">接受</span>':'<span style="color:var(--red)">拒絕</span>'):'<span class="text-xs">—</span>';
        return `<tr><td>${p.proposer_name||'—'}</td><td>${p.responder_name||'—'}</td>
          <td>${p.offer!=null?'$'+p.offer:'<span class="text-xs">未提</span>'}</td>
          <td>${result}</td><td>${p.payout_p!=null?'$'+p.payout_p:'—'}</td><td>${p.payout_r!=null?'$'+p.payout_r:'—'}</td></tr>`;
      }).join('');
    }
  }catch(e){}
}
</script>
</body>
</html>
