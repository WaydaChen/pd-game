<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>最後通牒 — 學生端</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0d0e14;--bg2:#13141c;--bg3:#1a1c27;--surface:#1e2030;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.16);--text:#e8e9f0;--text2:#9a9db8;--text3:#5c5f7a;--accent:#ff7eb6;--accent2:#ff9ec7;--green:#4ecb8a;--amber:#f0b429;--blue:#4a9eff;--red:#f06060;--r:14px;--rs:10px;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-weight:300;min-height:100vh;}
.wrap{max-width:560px;margin:0 auto;padding:1.5rem 1.2rem 3rem;}
.screen{display:none;}.screen.active{display:block;}
.hero{text-align:center;padding:1.2rem 0;}
.hero-icon{font-size:2.6rem;margin-bottom:.4rem;}
.hero h1{font-family:'Noto Serif TC',serif;font-size:1.5rem;font-weight:700;margin-bottom:.4rem;color:var(--accent);}
.hero p{color:var(--text2);font-size:.86rem;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem;margin-bottom:1rem;}
.card-title{font-family:'Noto Serif TC',serif;font-weight:600;margin-bottom:.5rem;}
.fg{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.7rem;}
label{font-size:.78rem;color:var(--text2);}
input[type=text]{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:.7rem .9rem;color:var(--text);font-size:.95rem;outline:none;}
input:focus{border-color:var(--accent);}
.btn{padding:.85rem 1.4rem;border-radius:var(--rs);font-size:1rem;font-weight:500;cursor:pointer;border:none;width:100%;font-family:'Noto Sans TC',sans-serif;transition:all .2s;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:var(--accent2);}
.btn-green{background:var(--green);color:#0d0e14;}.btn-red{background:var(--red);color:#fff;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.alias{display:inline-flex;align-items:center;gap:.4rem;background:var(--bg3);padding:.4rem .8rem;border-radius:20px;font-size:.85rem;}
.role{display:inline-block;padding:.3rem .8rem;border-radius:18px;font-weight:600;font-size:.8rem;}
.role.proposer{background:rgba(255,126,182,.15);color:var(--accent);border:1px solid rgba(255,126,182,.3);}
.role.responder{background:rgba(74,158,255,.15);color:var(--blue);border:1px solid rgba(74,158,255,.3);}
.big-num{font-size:3rem;font-weight:700;color:var(--accent2);text-align:center;margin:.6rem 0;}
.slider{width:100%;-webkit-appearance:none;height:8px;background:var(--bg3);border-radius:4px;outline:none;}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--accent);cursor:pointer;}
.slider::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--accent);cursor:pointer;border:none;}
.split-row{display:flex;justify-content:space-between;font-size:.85rem;margin-top:.6rem;}
.split-row .me{color:var(--accent);}.split-row .other{color:var(--blue);}
.alert{padding:.7rem .9rem;border-radius:var(--rs);font-size:.85rem;margin-bottom:.8rem;border:1px solid;}
.alert.warn{background:rgba(240,180,41,.08);border-color:rgba(240,180,41,.25);color:var(--amber);}
.alert.info{background:rgba(74,158,255,.08);border-color:rgba(74,158,255,.25);color:var(--blue);}
.alert.green{background:rgba(78,203,138,.08);border-color:rgba(78,203,138,.25);color:var(--green);}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
.bar-row{display:flex;align-items:center;gap:.5rem;margin:.2rem 0;font-size:.78rem;}
.bar-row .lbl{width:50px;color:var(--text2);text-align:right;}
.bar-row .bar{flex:1;height:14px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.bar-row .bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));}
.bar-row .v{width:30px;color:var(--text);font-weight:600;text-align:left;}
.stats-strip{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.5rem;}
.chip{padding:.3rem .7rem;border-radius:20px;background:var(--bg3);font-size:.78rem;border:1px solid var(--border);}
.payout-box{display:flex;justify-content:space-around;text-align:center;margin:1rem 0;}
.payout-box .pi{flex:1;}
.payout-box .pi .lbl{font-size:.75rem;color:var(--text3);}
.payout-box .pi .v{font-size:2rem;font-weight:700;}
</style>
</head>
<body>
<div class="wrap">

<div class="screen active" id="screen-login">
  <div class="hero"><div class="hero-icon">💰</div><h1 id="h-title">最後通牒實驗</h1><p id="h-desc">輸入學號姓名加入</p></div>
  <div class="card">
    <div class="fg"><label>學號</label><input type="text" id="i-sid" placeholder="例：B12345"></div>
    <div class="fg"><label>姓名</label><input type="text" id="i-name" placeholder="王小明"></div>
  </div>
  <button class="btn btn-primary" onclick="doLogin()">加入房間 →</button>
</div>

<div class="screen" id="screen-wait">
  <div class="hero"><div class="hero-icon">⏳</div><h1 id="w-title">已加入大廳</h1><p id="w-desc">等待老師開始實驗</p></div>
  <div class="card" style="text-align:center;">
    <p class="card-title">📖 規則</p>
    <p style="font-size:.9rem;color:var(--text2);line-height:1.6;" id="rules-text">—</p>
  </div>
  <p style="text-align:center;" id="alias-strip"></p>
</div>

<div class="screen" id="screen-propose">
  <div class="hero"><div class="hero-icon">🎁</div>
    <h1>你是<span class="role proposer">提案者</span></h1>
    <p>請選擇要分給回應者多少錢</p>
  </div>
  <div class="card">
    <p class="card-title">分配 $<span id="p-pie">100</span></p>
    <div class="big-num">$<span id="p-offer">50</span></div>
    <input type="range" class="slider" id="p-slider" min="0" max="100" step="5" value="50">
    <div class="split-row">
      <span class="me">你會得到 $<span id="p-mine">50</span></span>
      <span class="other">對方會得到 $<span id="p-other">50</span></span>
    </div>
    <p class="alert info" style="margin-top:.8rem;">⚠️ 若對方拒絕，雙方都得 $0</p>
  </div>
  <button class="btn btn-primary" id="btn-offer" onclick="submitOffer()">送出提案</button>
</div>

<div class="screen" id="screen-respond">
  <div class="hero"><div class="hero-icon">⚖️</div>
    <h1>你是<span class="role responder">回應者</span></h1>
    <p>對方提案：給你 $<span id="r-offer">—</span> ／ 對方留 $<span id="r-keep">—</span></p>
  </div>
  <div class="card" style="text-align:center;">
    <p class="card-title">你願意接受嗎？</p>
    <p style="color:var(--text2);font-size:.85rem;">接受 → 各拿提案金額 ｜ 拒絕 → 雙方都得 $0</p>
  </div>
  <div class="btn-row">
    <button class="btn btn-red" onclick="decide(false)">拒絕</button>
    <button class="btn btn-green" onclick="decide(true)">接受</button>
  </div>
</div>

<div class="screen" id="screen-pending">
  <div class="hero"><div class="hero-icon">⌛</div><h1>已送出</h1><p id="pend-desc">等待對方回應…</p></div>
  <p style="text-align:center;color:var(--text3);font-size:.8rem;">畫面會自動更新</p>
</div>

<div class="screen" id="screen-result">
  <div class="hero"><div class="hero-icon" id="res-ic">🎉</div><h1 id="res-title">結果</h1><p id="res-desc">—</p></div>
  <div class="card">
    <div class="payout-box">
      <div class="pi"><div class="lbl">你的收益</div><div class="v" id="res-mine" style="color:var(--accent);">$0</div></div>
      <div class="pi"><div class="lbl">對方收益</div><div class="v" id="res-other" style="color:var(--blue);">$0</div></div>
    </div>
  </div>
  <div class="card" id="card-stats" style="display:none;">
    <p class="card-title">📊 全班統計</p>
    <div id="stats-summary" class="stats-strip"></div>
    <p class="card-title" style="margin-top:.8rem;">提案分配直方圖</p>
    <div id="hist-area"></div>
    <p class="card-title" style="margin-top:.8rem;">💡 教學提示</p>
    <p style="font-size:.85rem;color:var(--text2);line-height:1.6;" id="theory-text">—</p>
  </div>
</div>

</div>

<script>
const ROOM=new URLSearchParams(location.search).get('room');
let PID=null, SETTINGS=null, POLL=null;

if(!ROOM) alert('沒有指定房間，請使用老師提供的連結');

async function bootstrap(){
  if(!ROOM) return;
  try{
    const r=await fetch('/api/exp-rooms/'+encodeURIComponent(ROOM));
    if(!r.ok){alert('找不到房間 '+ROOM);return;}
    const d=await r.json();
    if(d.type!=='ult'){location.replace('/?room='+encodeURIComponent(ROOM));return;}
    SETTINGS=d.settings;
    document.getElementById('h-title').textContent=SETTINGS.title||'最後通牒實驗';
    document.getElementById('rules-text').innerHTML=
      `提案者分配 $${SETTINGS.pie}：選一個要給回應者的金額。<br>回應者選擇接受（雙方各拿） 或 拒絕（雙方都得 $0）。`;
  }catch(e){alert('載入失敗：'+e.message);}
}
bootstrap();

async function doLogin(){
  const sid=document.getElementById('i-sid').value.trim();
  const name=document.getElementById('i-name').value.trim();
  if(!sid||!name){alert('請填寫學號姓名');return;}
  try{
    const r=await fetch(`/api/exp-rooms/${ROOM}/join`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sid,name})});
    if(!r.ok) throw new Error('加入失敗');
    PID=(await r.json()).player_id;
    show('wait');
    if(POLL) clearInterval(POLL);
    POLL=setInterval(poll,1500); poll();
  }catch(e){alert(e.message);}
}

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');}

async function poll(){
  if(!PID) return;
  try{
    const r=await fetch(`/api/exp-rooms/${ROOM}/players/${PID}`);
    if(!r.ok) return;
    const st=await r.json();
    if(st.my_nickname){
      document.getElementById('alias-strip').innerHTML=`<span class="alias">${st.my_avatar||''} ${st.my_nickname}</span>`;
    }
    if(st.status==='waiting'){show('wait');return;}
    if(st.status==='observer'){
      document.getElementById('w-title').textContent='你是觀察者';
      document.getElementById('w-desc').textContent='本局人數為奇數，等實驗結束你也會看到結果';
      show('wait');return;
    }
    if(st.status==='ended'){renderResult(st,true);show('result');clearInterval(POLL);POLL=null;return;}
    // playing
    const pair=st.my_pair||{};
    if(st.role==='proposer'){
      if(pair.offer==null){
        // 還沒提案
        const pie=SETTINGS.pie, step=SETTINGS.step;
        document.getElementById('p-pie').textContent=pie;
        const sl=document.getElementById('p-slider');
        sl.min=0; sl.max=pie; sl.step=step;
        if(!sl._init){sl.value=Math.floor(pie/2);sl._init=true;sl.oninput=updateSplit;updateSplit();}
        show('propose');
      }else if(!pair.resolved){
        document.getElementById('pend-desc').textContent='已提案 $'+pair.offer+'，等待回應者決定…';
        show('pending');
      }else{renderResult(st);show('result');}
    }else if(st.role==='responder'){
      if(pair.offer==null){
        document.getElementById('w-title').textContent='等提案者提案';
        document.getElementById('w-desc').textContent='請稍候…';
        show('wait');
      }else if(!pair.resolved){
        document.getElementById('r-offer').textContent=pair.offer;
        document.getElementById('r-keep').textContent=SETTINGS.pie-pair.offer;
        show('respond');
      }else{renderResult(st);show('result');}
    }
  }catch(e){}
}

function updateSplit(){
  const v=parseInt(document.getElementById('p-slider').value);
  document.getElementById('p-offer').textContent=v;
  document.getElementById('p-mine').textContent=SETTINGS.pie-v;
  document.getElementById('p-other').textContent=v;
}

async function submitOffer(){
  const v=parseInt(document.getElementById('p-slider').value);
  document.getElementById('btn-offer').disabled=true;
  try{
    const r=await fetch(`/api/exp-rooms/${ROOM}/players/${PID}/offer`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({offer:v})});
    if(!r.ok) throw new Error('送出失敗');
  }catch(e){alert(e.message);document.getElementById('btn-offer').disabled=false;}
}

async function decide(accept){
  try{
    const r=await fetch(`/api/exp-rooms/${ROOM}/players/${PID}/decide`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accept})});
    if(!r.ok) throw new Error('送出失敗');
  }catch(e){alert(e.message);}
}

function renderResult(st, withStats=false){
  const pair=st.my_pair||{};
  const isP=st.role==='proposer';
  const mine=isP?pair.payout_p:pair.payout_r;
  const other=isP?pair.payout_r:pair.payout_p;
  document.getElementById('res-mine').textContent='$'+(mine||0);
  document.getElementById('res-other').textContent='$'+(other||0);
  if(pair.accepted){
    document.getElementById('res-ic').textContent='🎉';
    document.getElementById('res-title').textContent='交易成功';
    document.getElementById('res-desc').textContent=isP?`你提了 $${pair.offer}，對方接受`:`你接受了 $${pair.offer}`;
  }else{
    document.getElementById('res-ic').textContent='💔';
    document.getElementById('res-title').textContent='交易破局';
    document.getElementById('res-desc').textContent=isP?`你提了 $${pair.offer}，對方拒絕 → 雙方都得 $0`:`你拒絕了 $${pair.offer} → 雙方都得 $0`;
  }
  if(withStats && st.stats){
    document.getElementById('card-stats').style.display='block';
    const s=st.stats;
    document.getElementById('stats-summary').innerHTML=`
      <span class="chip">${s.n} 對</span>
      <span class="chip">平均提案 $${s.avg_offer}</span>
      <span class="chip">中位 $${s.median_offer}</span>
      ${s.accept_rate!=null?`<span class="chip" style="color:var(--green)">接受率 ${(s.accept_rate*100).toFixed(0)}%</span>`:''}
      <span class="chip" style="color:var(--amber)">公平提案率 ${(s.fair_rate*100).toFixed(0)}%</span>`;
    const hist=s.histogram||[];
    if(hist.length){
      const max=Math.max(...hist.map(h=>h[1]));
      document.getElementById('hist-area').innerHTML=hist.map(([k,v])=>{
        const pct=(v/max*100).toFixed(0);
        return `<div class="bar-row"><div class="lbl">$${k}</div><div class="bar"><div class="fill" style="width:${pct}%;"></div></div><div class="v">${v}</div></div>`;
      }).join('');
    }
    // 教學提示
    let tx='';
    if(s.avg_offer>=s.pie*0.4){
      tx=`平均提案約 $${s.avg_offer}（≥${(s.pie*0.4)|0}）— 接近「平分」，這違背「自利理性」預測（理性提案者應只給最少）。實證顯示人們有<strong>公平偏好</strong>。`;
    }else{
      tx=`平均提案 $${s.avg_offer} 偏低；理論預測接受率會高，但若實際接受率不高，可表示回應者願意「懲罰不公」，付代價拒絕。`;
    }
    document.getElementById('theory-text').innerHTML=tx;
  }
}
</script>
</body>
</html>
